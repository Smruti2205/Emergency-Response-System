<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Alerts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h2 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 0 10px #ccc;
        }
        th, td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: left;
            vertical-align: top;
        }
        th {
            background-color: #f44336;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <h2>📢 Emergency Alerts Dashboard</h2>
    <p style="text-align: center; margin-top: 10px;">
        <a href="/map" target="_blank" style="color: #f44336; font-weight: bold; text-decoration: none;">
            🗺️ View Alerts on Map
        </a>
    </p>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>User ID</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Address</th>
                <th>Message</th>
                <th>Timestamp</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for alert in alerts %}
            <tr>
                <td>{{ alert[0] }}</td>
                <td>{{ alert[1] }}</td>
                <td>{{ alert[2] }}</td>
                <td>{{ alert[3] }}</td>
                <td>{{ alert[4] }}</td>
                <td><pre>{{ alert[5] }}</pre></td>
                <td>{{ alert[6] }}</td>
                <td>{{ alert[7] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
